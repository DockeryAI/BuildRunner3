                    - generic [ref=e944]:
                      - heading "Great Card but too pricey." [level=4] [ref=e945]
                      - generic [ref=e948]: The card works fantastic. I need a small card to fit my my build. Is a 2.2 slot card if your working small form factor pc. It runs wonders. The only downside is the price but what can you do when there is a shortage. $2700 was what I paid which I don't recommended but what can you do wait a year or 2 for something better. Overall is great card and at its msrp. If you can't wait then check if you have the funds for it. Because it will be an investment than just gaming remember that.
