        - generic [ref=e148]:
          - generic [ref=e149]: S
          - generic [ref=e150]:
            - generic [ref=e151]: Safe
            - paragraph [ref=e152]: Every agent response is governed by safety rails that prevent harmful, misleading, or non-compliant outputs. Guardrails are auditable and configurable per jurisdiction.
        - generic [ref=e153]:
          - generic [ref=e154]: A
          - generic [ref=e155]:
            - generic [ref=e156]: Accurate
            - paragraph [ref=e157]: Agents are grounded in your product documentation, underwriting guidelines, and claims procedures — not general knowledge. Hallucinations are architecturally prevented.
        - generic [ref=e158]:
          - generic [ref=e159]: F
          - generic [ref=e160]:
            - generic [ref=e161]: Fair
            - paragraph [ref=e162]: Bias testing is embedded in the deployment pipeline. Outcomes are monitored across demographic segments to ensure equitable treatment under FCA and EU AI Act requirements.
        - generic [ref=e163]:
          - generic [ref=e164]: E
          - generic [ref=e165]:
            - generic [ref=e166]: Explainable
            - paragraph [ref=e167]: Every decision an agent makes can be traced back to a source. Full conversation logs, decision rationales, and audit trails are available for regulatory review.
        - generic [ref=e168]:
          - generic [ref=e169]: R
          - generic [ref=e170]:
            - generic [ref=e171]: Reliable
            - paragraph [ref=e172]: Enterprise SLAs, uptime guarantees, and graceful degradation protocols ensure your customer experience never depends on a single point of failure.
