      - generic [ref=e143]: The Framework
      - heading "Built on SAFER — the standard for responsible AI in regulated industries." [level=2] [ref=e144]:
        - text: Built on SAFER —
        - emphasis [ref=e145]: the standard for responsible AI in regulated industries.
      - paragraph [ref=e146]: Insurance is a regulated, high-stakes domain. SAFER is OpenDialog's proprietary framework ensuring every agent interaction is auditable, fair, and compliant — before anything reaches production.
