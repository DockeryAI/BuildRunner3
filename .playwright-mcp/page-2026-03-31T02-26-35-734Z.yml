    - generic [ref=e44]:
      - paragraph [ref=e45]: Chapter One
      - heading "Payments that feel invisible" [level=2] [ref=e46]
      - paragraph [ref=e47]: The best financial infrastructure disappears. Your customers never think about the plumbing — they think about your product. Stripe processes payments across 135+ currencies with a single integration, so you can focus on building what matters.
      - paragraph [ref=e48]: Like a great whisky, the complexity is hidden beneath the surface. Years of engineering distilled into an API call that settles in milliseconds. Every edge case handled. Every compliance box checked. Every currency converted. You pour; we do everything else.
      - blockquote [ref=e49]:
        - paragraph [ref=e50]: "\"A single integration for every payment method your customers want.\""
      - paragraph [ref=e51]: From cards to wallets to bank transfers to buy-now-pay-later — one unified platform adapts to local preferences automatically. Your checkout converts at the highest rates in the industry because it speaks every customer's language, currency, and preferred payment method without you writing a single line of conditional logic.
    - generic [ref=e54]:
      - paragraph [ref=e55]: Chapter Two
      - heading "Revenue isn't one thing — it's everything" [level=2] [ref=e56]
      - paragraph [ref=e57]: Billing. Invoicing. Subscriptions. Revenue recognition. Tax compliance. Fraud prevention. Each one is a discipline. Together they're an orchestra — and Stripe is the conductor. Over 200 million subscriptions managed, each one a recurring relationship between a business and its customer, humming quietly in the background.
      - paragraph [ref=e58]: The platform grows with you. Start with a checkout link. Graduate to a full billing engine. Add multi-party payouts when you launch a marketplace. Embed financial services when you become a platform yourself. No migrations. No re-integrations. Just depth, whenever you're ready to go deeper.
